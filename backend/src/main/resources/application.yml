spring:
  application:
    name: microstock-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/msamp}
    username: ${DB_USERNAME:msamp}
    password: ${DB_PASSWORD:msamp}

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Application-specific settings (bound in AppSecurityProperties / storage config)
app:
  security:
    # Base64 or plain secret; must be >= 32 bytes for HS256. Override in production.
    jwt-secret: ${JWT_SECRET:dev-secret-change-me-please-32bytes-minimum-0123456789}
    access-token-ttl-minutes: ${ACCESS_TTL_MIN:15}
    refresh-token-ttl-days: ${REFRESH_TTL_DAYS:14}
    issuer: microstock-platform
  storage:
    # Dev note: on Rancher Desktop (Windows) the MinIO port-forward answers on IPv6
    # loopback only; Java resolves "localhost" to IPv4 first and gets a connection
    # reset, so the server-side client uses [::1]. Override in real environments.
    endpoint: ${S3_ENDPOINT:http://[::1]:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket: ${S3_BUCKET:msamp-media}
    region: ${S3_REGION:us-east-1}
    public-base-url: ${S3_PUBLIC_URL:http://localhost:9000/msamp-media}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
