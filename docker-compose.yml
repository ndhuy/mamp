# Local development infrastructure for the Microstock Asset Management Platform.
# Application services (backend/frontend) run on the host during development;
# this file provides the backing services they depend on.
services:
  postgres:
    image: postgres:16-alpine
    container_name: msamp-postgres
    environment:
      POSTGRES_DB: msamp
      POSTGRES_USER: msamp
      POSTGRES_PASSWORD: msamp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msamp -d msamp"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: msamp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the bucket on startup so the backend has somewhere to write thumbnails.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/msamp-media;
      mc anonymous set download local/msamp-media;
      echo 'MinIO bucket ready';
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: msamp-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 500

volumes:
  pgdata:
  miniodata:
