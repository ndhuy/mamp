# nginx config for the production frontend container.
# Serves the built SPA and reverse-proxies the API and object storage so the
# whole app is same-origin on port 80 (no CORS needed).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache built assets aggressively (they are content-hashed by Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing — fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;   # allow thumbnail uploads (<= 5 MB + overhead)
    }

    # Thumbnails and other objects, proxied from the MinIO bucket.
    location /storage/ {
        proxy_pass http://minio:9000/msamp-media/;
        proxy_set_header Host $host;
    }
}
